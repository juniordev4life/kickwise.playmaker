name: Match Day (deploy)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT: kickwise-prod
  GCP_REGION: europe-west3
  ARTIFACT_REGISTRY: europe-west3-docker.pkg.dev/kickwise-prod/kickwise
  IMAGE_NAME: playmaker
  SERVICE_NAME: kickwise-euw3-run-playmaker
  WIF_PROVIDER: projects/264607219534/locations/global/workloadIdentityPools/kickwise-euw3-pool-github/providers/kickwise-euw3-prov-github
  DEPLOY_SA: kickwise-euw3-sa-gha-deploy@kickwise-prod.iam.gserviceaccount.com

jobs:
  warmup-and-deploy:
    name: Warmup, Push & Match Day
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Compute image tag
        id: tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "fqin=${ARTIFACT_REGISTRY}/${IMAGE_NAME}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "fqin_latest=${ARTIFACT_REGISTRY}/${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Build container image
        run: |
          docker build \
            -t "${{ steps.tag.outputs.fqin }}" \
            -t "${{ steps.tag.outputs.fqin_latest }}" \
            .

      - name: Push container image
        run: |
          docker push "${{ steps.tag.outputs.fqin }}"
          docker push "${{ steps.tag.outputs.fqin_latest }}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE_NAME}" \
            --project="${GCP_PROJECT}" \
            --region="${GCP_REGION}" \
            --image="${{ steps.tag.outputs.fqin }}" \
            --quiet

      - name: Show service URL
        run: |
          URL=$(gcloud run services describe "${SERVICE_NAME}" \
            --project="${GCP_PROJECT}" \
            --region="${GCP_REGION}" \
            --format='value(status.url)')
          echo "Playmaker is live at: ${URL}"
          echo "playmaker_url=${URL}" >> "$GITHUB_OUTPUT"
